<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b855ff"/>
      <stop offset="100%" stop-color="#f050c8"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Diamond body -->
  <polygon points="50,3 97,50 50,97 3,50" fill="url(#g1)" filter="url(#glow)"/>

  <!-- Shine facet top -->
  <polygon points="50,3 97,50 50,50" fill="url(#g2)"/>

  <!-- < bracket -->
  <polyline points="30,43 21,50 30,57" fill="none" stroke="white" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- > bracket -->
  <polyline points="70,43 79,50 70,57" fill="none" stroke="white" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- / slash -->
  <line x1="57" y1="35" x2="43" y2="65" stroke="white" stroke-width="6.5" stroke-linecap="round"/>
</svg>
